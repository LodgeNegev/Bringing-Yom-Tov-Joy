<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bringing Yom Tov Joy - Donate</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f7f7f7; padding: 20px; }
        .container { max-width: 520px; margin: auto; background: #ffffff; padding: 25px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #003399; }
        .red { color: red; font-weight: bold; }
        label { display: block; margin-top: 12px; }
        input[type="text"], input[type="email"], input[type="number"] { width: 100%; padding: 9px; margin-top: 4px; box-sizing: border-box; }
        .note { text-align: center; font-size: 16px; }
        .submit-btn { display: block; margin: 22px auto; border: none; background: none; }
    </style>
</head>

<body>
<div class="container">
    <h2>Bringing Yom Tov Joy</h2>

    <p class="note">
        Please enter the amount you would like to donate.<br>
        <span class="red">A contribution of R360 fills a meaningful Rosh Hashanah food parcel.</span>
    </p>

    <form name="PayFastPayNowForm" action="https://payment.payfast.io/eng/process" method="post">
        <input type="hidden" name="cmd" value="_paynow">
        <input type="hidden" name="receiver" value="10071923">
        <input type="hidden" name="item_name" value="Bringing Yom Tov Joy Donation">
        <input type="hidden" name="item_description" value="Rosh Hashanah Appeal Donation">

        <label for="amount">Donation Amount (R):</label>
        <input id="amount" name="amount" type="number" step="0.01" min="5.00" value="360.00" required>

        <label for="name_first">First Name:</label>
        <input type="text" id="name_first" name="name_first" required>

        <label for="name_last">Last Name:</label>
        <input type="text" id="name_last" name="name_last" required>

        <label for="email_address">Email Address:</label>
        <input type="email" id="email_address" name="email_address" required>

        <label for="custom_str1">Message or Comment:</label>
        <input type="text" id="custom_str1" name="custom_str1" maxlength="255">

        <div style="text-align:center;">
            <input type="image" class="submit-btn"
                   src="https://my.payfast.io/images/buttons/DonateNow/Primary-Large-DonateNow.png"
                   alt="Donate Now">
        </div>
    </form>
</div>
</body>
</html>
